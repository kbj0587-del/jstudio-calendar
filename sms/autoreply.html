<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>자동 응답 · J.SMS</title>
<link rel="stylesheet" href="sms.css">
</head>
<body>
<div id="hdr"></div>
<div class="wrap">
  <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap">
    <div><h1 class="page-title">자동 응답</h1><p class="page-desc" style="margin:0">키워드 또는 시간대(수업중·부재중) 기준으로 수신 메시지에 자동 답장합니다.</p></div>
    <button class="btn" onclick="openEdit()">+ 새 규칙</button>
  </div>

  <div class="card" style="background:color-mix(in srgb,var(--accent) 6%,var(--surface));margin-bottom:16px;padding:16px 18px">
    <div style="font-size:13.5px;color:var(--muted2);line-height:1.6">
      💡 <b>"수신거부"</b> 답장은 자동으로 수신거부 목록에 등록됩니다(항상 활성).<br>
      💡 <b>시간대 규칙</b>이 키워드 규칙보다 우선 적용되며, 메시지 1건당 응답은 1건만 나갑니다.<br>
      🛡 같은 번호로 <b>같은 응답을 60분 내 재발송하지 않습니다</b> (무한 반복 발송 방지).
    </div>
  </div>

  <div id="list" style="display:flex;flex-direction:column;gap:12px"></div>
</div>

<script src="sms.js"></script>
<script>
let rules=[];
const MATCH_LABELS={contains:'포함',exact:'정확히 일치',starts:'~로 시작'};
const hm=(s)=>String(s||'').slice(0,5);
async function boot(){ renderHeader('autoreply'); await load(); }
window.onAuthReady = boot;
async function load(){ rules = await api.get('/api/sms/autoreply'); render(); }
function render(){
  document.getElementById('list').innerHTML = rules.map(r=>`
    <div class="card" style="padding:16px 18px;display:flex;align-items:center;gap:16px">
      <div class="toggle ${r.enabled?'on':''}" onclick="toggle('${r.id}',${!r.enabled})"><div class="toggle-knob"></div></div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap">
          ${r.rule_type==='time'
            ? `<span class="tag">⏰ ${hm(r.start_time)}~${hm(r.end_time)}</span><span class="badge badge-orange">시간대</span>`
            : `<span class="tag">${esc(r.keyword)}</span><span class="badge badge-gray">${MATCH_LABELS[r.match_type]||r.match_type}</span>`}
          ${r.enabled?'<span class="badge badge-green">활성</span>':'<span class="badge badge-gray">비활성</span>'}
        </div>
        <div style="font-size:13px;color:var(--muted2);white-space:pre-wrap;overflow:hidden;text-overflow:ellipsis">↳ ${esc(r.reply_content)}</div>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0">
        <button class="btn btn-ghost btn-sm" onclick='openEdit(${JSON.stringify(r).replace(/'/g,"&#39;")})'>수정</button>
        <button class="btn btn-danger btn-sm" onclick="del('${r.id}')">삭제</button>
      </div>
    </div>`).join('') || `<div class="card" style="text-align:center;color:var(--muted)">등록된 자동응답 규칙이 없습니다.</div>`;
}
async function toggle(id,val){
  const r=rules.find(x=>x.id===id);
  await api.put('/api/sms/autoreply/'+id,{ keyword:r.keyword, match_type:r.match_type, reply_content:r.reply_content,
    enabled:val, rule_type:r.rule_type||'keyword', start_time:hm(r.start_time)||null, end_time:hm(r.end_time)||null });
  await load(); toast(val?'규칙 활성화':'규칙 비활성화');
}
function openEdit(r){
  r=r||{};
  const type=r.rule_type==='time'?'time':'keyword';
  openModal(`
    <h3>${r.id?'규칙 수정':'새 자동응답 규칙'}</h3>
    <div><label class="lbl">규칙 유형</label>
      <select id="r_type" class="inp" onchange="switchType()">
        <option value="keyword" ${type==='keyword'?'selected':''}>키워드 응답 — 특정 단어가 오면 답장</option>
        <option value="time" ${type==='time'?'selected':''}>시간대 응답 — 지정 시간에 오는 모든 문자에 답장</option>
      </select></div>
    <div id="kwFields" class="${type==='time'?'hidden':''}">
      <div><label class="lbl">키워드 *</label><input id="r_kw" class="inp" value="${esc(r.keyword||'')}" placeholder="예: 예약, 위치, 시간표"></div>
      <div style="margin-top:12px"><label class="lbl">매칭 방식</label>
        <select id="r_match" class="inp">
          ${['contains','exact','starts'].map(t=>`<option value="${t}" ${r.match_type===t?'selected':''}>${MATCH_LABELS[t]}</option>`).join('')}
        </select></div>
    </div>
    <div id="timeFields" class="${type==='time'?'':'hidden'}">
      <label class="lbl">적용 시간 (예: 수업 09:00~10:00) *</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="time" id="r_start" class="inp" style="flex:1" value="${hm(r.start_time)||'09:00'}">
        <span style="color:var(--muted)">~</span>
        <input type="time" id="r_end" class="inp" style="flex:1" value="${hm(r.end_time)||'10:00'}">
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">이 시간대에 도착하는 모든 수신 문자에 아래 내용으로 자동 답장합니다. (매일 반복, 자정 걸침 가능)</div>
    </div>
    <div><label class="lbl">자동 응답 내용 *</label><textarea id="r_reply" class="inp" rows="5" placeholder="예: 지금은 회원님들과 즐겁게 수업을 하고 있습니다. 수업이 종료되고 연락드리겠습니다. 급한 용무는 내용 남겨주시면 감사하겠습니다.">${esc(r.reply_content||'')}</textarea></div>
    <label style="display:flex;align-items:center;gap:8px;font-size:13.5px;cursor:pointer">
      <input type="checkbox" id="r_enabled" ${r.enabled?'checked':''}> 저장 후 바로 활성화
    </label>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn" onclick="save('${r.id||''}')">저장</button>
    </div>`);
}
function switchType(){
  const t=document.getElementById('r_type').value;
  document.getElementById('kwFields').classList.toggle('hidden',t==='time');
  document.getElementById('timeFields').classList.toggle('hidden',t!=='time');
}
async function save(id){
  const type=document.getElementById('r_type').value;
  const body={ rule_type:type,
    keyword:type==='keyword'?document.getElementById('r_kw').value.trim():'',
    match_type:type==='keyword'?document.getElementById('r_match').value:'contains',
    start_time:type==='time'?document.getElementById('r_start').value:null,
    end_time:type==='time'?document.getElementById('r_end').value:null,
    reply_content:document.getElementById('r_reply').value.trim(),
    enabled:document.getElementById('r_enabled').checked };
  if(!body.reply_content) return toast('응답 내용을 입력하세요');
  if(type==='keyword'&&!body.keyword) return toast('키워드를 입력하세요');
  if(type==='time'&&(!body.start_time||!body.end_time)) return toast('시간을 지정하세요');
  try{ if(id) await api.put('/api/sms/autoreply/'+id,body); else await api.post('/api/sms/autoreply',body);
    closeModal(); await load(); toast('저장 완료'); }catch(e){ toast(e.message); }
}
async function del(id){ if(!confirm('이 규칙을 삭제할까요?'))return;
  await api.del('/api/sms/autoreply/'+id); await load(); toast('삭제 완료'); }
boot();
</script>
</body>
</html>
