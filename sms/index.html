<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>메시지 발송센터 · J.SMS</title>
<link rel="stylesheet" href="sms.css">
</head>
<body>
<div id="hdr"></div>

<div class="wrap">
  <div class="dash" id="dash">
    <!-- 왼쪽: 발송 패널 -->
    <div class="compose" id="compose">

      <!-- ① 수신자 -->
      <div>
        <div class="section-label">수신자</div>
        <div id="tagChips" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px"></div>
        <input id="tagInp" class="inp" placeholder="번호 직접 입력 후 Enter" onkeydown="onTagKey(event)">
        <input id="searchInp" class="inp" style="margin-top:8px" placeholder="이름·번호로 회원 검색" oninput="renderContacts()">
        <div id="contactList" style="max-height:150px;overflow-y:auto;margin-top:8px;display:flex;flex-direction:column;gap:2px"></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px" id="groupChips"></div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px">
          <span style="font-size:12px;color:var(--muted2);cursor:pointer" onclick="document.getElementById('fileInp').click()">＋ 연락처 파일(CSV·TXT) 업로드</span>
          <span style="font-size:13px;font-weight:600;color:var(--accent)" id="queueCount">0명</span>
        </div>
        <input type="file" id="fileInp" accept=".csv,.txt" style="display:none" onchange="importFile(event)">
      </div>

      <div class="divider"></div>

      <!-- ② 메시지 -->
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <div class="section-label" style="margin:0">발송 메시지</div>
          <div id="byteInfo" style="font-size:11.5px;font-weight:600;color:var(--muted)">0 byte · SMS</div>
        </div>
        <textarea id="msgInp" class="inp" rows="4" placeholder="메시지를 입력하세요" oninput="updateBytes()"></textarea>

        <!-- 이미지 (MMS): 드래그·파일·URL -->
        <div id="imgZone" class="img-zone" style="margin-top:8px"
             onclick="document.getElementById('imgFileInp').click()"
             ondragover="imgDrag(event,true)" ondragleave="imgDrag(event,false)" ondrop="imgDrop(event)">
          이미지를 드래그하거나 클릭해 첨부 · 붙여넣기(Ctrl+V) 지원
        </div>
        <input type="file" id="imgFileInp" accept="image/*" style="display:none" onchange="onImgFile(event)">
        <input id="imgUrlInp" class="inp" style="margin-top:8px" placeholder="또는 이미지 URL 입력" onchange="setImageFromUrl()">
        <div id="imgPreview" style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap"></div>

        <!-- URL 단축 -->
        <div style="display:flex;gap:6px;margin-top:8px">
          <input id="urlInp" class="inp" style="flex:1" placeholder="긴 URL → 단축해 본문 삽입">
          <button class="btn btn-dark btn-sm" onclick="shortenUrl()">단축</button>
        </div>

        <div id="quickTpl" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px"></div>
      </div>

      <div class="divider"></div>

      <!-- ③ 발신번호 (컴팩트, 접기) -->
      <div>
        <div class="compact-box" onclick="toggleSender()">
          <span>발신번호 <b id="senderNowLabel" style="color:var(--text)">—</b></span>
          <span style="color:var(--muted)" id="senderChev">▸</span>
        </div>
        <div id="senderList" class="hidden" style="display:flex;flex-direction:column;gap:6px;margin-top:8px"></div>
      </div>

      <!-- ④ 수신거부 · 예약 (컴팩트, 나란히) -->
      <div style="display:flex;gap:8px">
        <div class="compact-box" onclick="toggleBlock()">
          <span>수신거부 <span class="badge badge-red" id="blockCount" style="margin-left:2px">0</span></span>
          <span style="color:var(--muted)" id="blockChev">▸</span>
        </div>
        <div class="compact-box" onclick="toggleSchedule()">
          <span>예약 발송</span>
          <div class="toggle" id="schedToggle"><div class="toggle-knob"></div></div>
        </div>
      </div>
      <div id="blockPanel" class="hidden" style="display:flex;flex-direction:column;gap:8px;background:var(--surface2);border-radius:12px;padding:10px 12px">
        <div id="blockItems" style="display:flex;flex-direction:column;gap:4px;max-height:130px;overflow-y:auto"></div>
        <input id="blockInp" class="inp" placeholder="번호 입력 후 Enter로 수신거부" onkeydown="onBlockKey(event)">
        <div style="font-size:10.5px;color:var(--muted);line-height:1.5">"수신거부" 답장 수신 시 자동 등록됩니다. 등록 번호는 발송 대상에서 자동 제외됩니다.</div>
      </div>
      <div id="schedPanel" class="hidden" style="display:flex;gap:8px;background:var(--surface2);border-radius:12px;padding:10px 12px">
        <input type="date" id="schedDate" class="inp" style="flex:1">
        <input type="time" id="schedTime" class="inp" style="width:118px">
      </div>

      <button class="btn" id="sendBtn" onclick="doSend()">발송하기</button>
    </div>

    <!-- 드래그 리사이즈 핸들 -->
    <div class="resizer" id="resizer" title="드래그하여 폭 조절"><div class="resizer-grip"></div></div>

    <!-- 오른쪽: 메신저 -->
    <div class="messenger" id="messenger">
      <div class="thread-list">
        <div class="section-label" style="padding:16px 16px 8px">대화</div>
        <div id="threadItems" style="flex:1;overflow-y:auto"></div>
      </div>
      <div class="chat">
        <div id="chatHeader" style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border2)">
          <div><div id="chatName" style="font-size:14.5px;font-weight:600">대화를 선택하세요</div>
               <div id="chatPhone" style="font-size:12px;color:var(--muted);margin-top:1px"></div></div>
          <div class="pill pill-green" id="fcmPill"><div class="dot dot-green"></div>게이트웨이</div>
        </div>
        <div class="chat-body" id="chatBody"></div>
        <div style="padding:14px 20px;border-top:1px solid var(--border2);display:flex;gap:10px;align-items:flex-end">
          <textarea id="replyInp" class="inp" rows="1" placeholder="답장 입력… (Ctrl+Enter 전송)" style="resize:none" onkeydown="onReplyKey(event)"></textarea>
          <button class="btn" onclick="sendReply()">전송</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="sms.js"></script>
<script>
/* ── 상태 ── */
let members = [], groups = [], blocked = [], senders = [], selectedSender = 0;
const selected = new Set();
let extraTags = [];
let activeGroupId = null;
let threads = [], activeThread = null;
let scheduleOn = false;
let currentImage = '';                 // 첨부 이미지 URL (1장)
let composeW = parseInt(localStorage.getItem('sms_composeW'),10) || 400;

async function boot(){
  renderHeader('index',
    `<span class="pill pill-gray" id="senderPill">발신 —</span>
     <span class="pill pill-gray" id="gwPill"><div class="dot dot-red"></div>게이트웨이</span>
     <span class="pill pill-gray" id="quotaPill">오늘 0/0</span>`);
  applyComposeWidth();
  initResizer();
  window.addEventListener('resize', applyComposeWidth);
  window.addEventListener('paste', onPaste);
  await refreshBootstrap();
  await Promise.all([loadMembers(), loadGroups(), loadTemplates(), loadBlocked(), loadThreads()]);
  updateBytes();
  setInterval(loadThreads, 20000);
  setInterval(refreshBootstrap, 30000);
}
window.onAuthReady = boot;

/* ── 리사이즈 ── */
function applyComposeWidth(){
  const c=document.getElementById('compose');
  if (window.innerWidth<=900){ c.style.width=''; }
  else { c.style.width=composeW+'px'; }
}
function initResizer(){
  const h=document.getElementById('resizer');
  h.addEventListener('mousedown',(e)=>{
    if (window.innerWidth<=900) return;
    e.preventDefault();
    const startX=e.clientX, startW=composeW;
    h.classList.add('dragging'); document.body.classList.add('resizing');
    function move(ev){ composeW=Math.max(320,Math.min(640,startW+ev.clientX-startX)); document.getElementById('compose').style.width=composeW+'px'; }
    function up(){ document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up);
      h.classList.remove('dragging'); document.body.classList.remove('resizing'); localStorage.setItem('sms_composeW',composeW); }
    document.addEventListener('mousemove',move); document.addEventListener('mouseup',up);
  });
}

async function refreshBootstrap(){
  try{
    const d = await api.get('/api/sms/bootstrap');
    senders = d.senders || [];
    renderSenders(); updateSenderPill();
    const qp=document.getElementById('quotaPill'); if(qp) qp.textContent=`오늘 ${d.quotaUsed}/${d.quotaTotal}`;
    document.getElementById('blockCount').textContent = d.blockedCount;
    // 헤더 게이트웨이 pill
    const gp=document.getElementById('gwPill');
    if(gp){ gp.className='pill '+(d.gatewayOnline?'pill-green':'pill-red');
      gp.innerHTML=`<div class="dot ${d.gatewayOnline?'dot-green':'dot-red'}"></div>게이트웨이 ${d.gatewayOnline?'ON':'OFF'}`; }
    // 메신저 게이트웨이 pill
    const pill=document.getElementById('fcmPill');
    if(pill){ pill.className='pill '+(d.gatewayOnline?'pill-green':'pill-red');
      pill.innerHTML=`<div class="dot ${d.gatewayOnline?'dot-green':'dot-red'}"></div>${d.gatewayOnline?'게이트웨이 ON':'게이트웨이 OFF'}`; }
  }catch(e){ if(e.message!=='auth') console.error(e); }
}

function updateSenderPill(){
  const s=senders[selectedSender];
  const label=s?s.number:'—';
  const sp=document.getElementById('senderPill'); if(sp) sp.textContent='발신 '+label;
  const nl=document.getElementById('senderNowLabel'); if(nl) nl.textContent=label;
}
function toggleSender(){ const l=document.getElementById('senderList'); l.classList.toggle('hidden');
  document.getElementById('senderChev').textContent=l.classList.contains('hidden')?'▸':'▾'; }
function renderSenders(){
  const el=document.getElementById('senderList');
  if(!senders.length){ el.innerHTML=`<div style="font-size:12px;color:var(--muted)">등록된 발신번호가 없습니다.</div>`; return; }
  el.innerHTML=senders.map((s,i)=>`
    <div class="contact-row" style="border:1.5px solid ${i===selectedSender?'var(--accent)':'var(--border)'}" onclick="selectedSender=${i};renderSenders();updateSenderPill()">
      <div class="check ${i===selectedSender?'on':''}" style="border-radius:50%">${i===selectedSender?'●':''}</div>
      <div style="flex:1"><div style="font-size:13px;font-weight:600">${esc(s.number)}</div>
        <div style="font-size:11.5px;color:var(--muted)">${esc(s.label||'')}</div></div>
      ${s.verified?'<span class="badge badge-green">인증됨</span>':''}
    </div>`).join('');
}

async function loadMembers(){ members=await api.get('/api/sms/members'); renderContacts(); }
async function loadGroups(){
  groups=await api.get('/api/sms/groups');
  document.getElementById('groupChips').innerHTML=
    `<span class="chip ${activeGroupId===null?'chip-accent':''}" onclick="pickGroup(null)">전체</span>`+
    groups.map(g=>`<span class="chip ${activeGroupId===g.id?'chip-accent':''}" onclick="pickGroup('${g.id}')">${esc(g.name)} ${g.member_count}</span>`).join('');
}
async function pickGroup(id){
  activeGroupId=id;
  if(id){ const gm=await api.get('/api/sms/groups/'+id+'/members'); selected.clear(); gm.forEach(m=>selected.add(m.id)); }
  loadGroups(); renderContacts(); updateQueue();
}
function renderContacts(){
  const term=(document.getElementById('searchInp').value||'').trim();
  const list=members.filter(m=>!term||m.name.includes(term)||digits(m.phone).includes(digits(term)));
  document.getElementById('contactList').innerHTML=list.map(m=>`
    <div class="contact-row" onclick="toggleContact('${m.id}')">
      <div class="check ${selected.has(m.id)?'on':''}">${selected.has(m.id)?'✓':''}</div>
      <div class="avatar" style="width:26px;height:26px;font-size:11px;background:${avatarColor(m.name)}">${initial(m.name)}</div>
      <div style="flex:1;min-width:0;display:flex;align-items:center;gap:6px">
        <span style="font-size:13.5px;font-weight:500">${esc(m.name)}</span>
        ${m.blocked?'<span class="badge badge-red">수신거부</span>':''}
      </div>
      <span style="font-size:12px;color:var(--muted)">${esc(fmtPhone(m.phone))}</span>
    </div>`).join('') || `<div style="font-size:12.5px;color:var(--muted);padding:10px;text-align:center">회원이 없습니다.</div>`;
}
function toggleContact(id){ selected.has(id)?selected.delete(id):selected.add(id); renderContacts(); updateQueue(); }

function onTagKey(e){ if(e.key!=='Enter')return; const v=digits(e.target.value);
  if(v.length>=8 && !extraTags.includes(v)) extraTags.push(v); e.target.value=''; renderTags(); updateQueue(); }
function renderTags(){ document.getElementById('tagChips').innerHTML=extraTags.map((t,i)=>
  `<span class="tag">${esc(fmtPhone(t))}<span class="x" onclick="extraTags.splice(${i},1);renderTags();updateQueue()">×</span></span>`).join(''); }

function targetPhones(){
  const phones=[]; members.forEach(m=>{ if(selected.has(m.id)) phones.push(digits(m.phone)); });
  extraTags.forEach(t=>phones.push(t)); return [...new Set(phones)];
}
function updateQueue(){ document.getElementById('queueCount').textContent=targetPhones().length+'명'; }

function updateBytes(){
  const msg=document.getElementById('msgInp').value;
  const b=smsBytes(msg), type=msgTypeByBytes(b,!!currentImage);
  const el=document.getElementById('byteInfo');
  el.textContent=`${b} byte · ${type}`;
  el.style.color=(b>90&&!currentImage)?'var(--orange-d)':'var(--muted)';
}

/* ── 이미지 첨부 ── */
function fileToBase64(file){ return new Promise((res,rej)=>{ const r=new FileReader();
  r.onload=()=>res(String(r.result).split(',')[1]); r.onerror=rej; r.readAsDataURL(file); }); }
async function uploadImageFile(file){
  if(!file || !file.type.startsWith('image/')) return toast('이미지 파일만 첨부할 수 있습니다');
  if(file.size>5*1024*1024) return toast('5MB 이하 이미지만 가능합니다');
  toast('이미지 업로드 중…');
  try{
    const data=await fileToBase64(file);
    const d=await api.post('/api/sms/upload-image',{ data, contentType:file.type, ext:(file.name.split('.').pop()||'jpg') });
    setImage(d.url); toast('이미지 첨부 완료');
  }catch(e){ toast('업로드 실패: '+e.message); }
}
function onImgFile(e){ const f=e.target.files[0]; if(f) uploadImageFile(f); e.target.value=''; }
function imgDrag(e,on){ e.preventDefault(); document.getElementById('imgZone').classList.toggle('dragover',on); }
function imgDrop(e){ e.preventDefault(); document.getElementById('imgZone').classList.remove('dragover');
  const f=e.dataTransfer.files[0]; if(f) uploadImageFile(f); }
function onPaste(e){ const items=(e.clipboardData||{}).items||[];
  for(const it of items){ if(it.type&&it.type.startsWith('image/')){ const f=it.getAsFile(); if(f){ uploadImageFile(f); e.preventDefault(); return; } } } }
function setImageFromUrl(){ const u=document.getElementById('imgUrlInp').value.trim(); if(u) setImage(u); }
function setImage(url){
  currentImage=url;
  document.getElementById('imgUrlInp').value=url;
  document.getElementById('imgPreview').innerHTML = url?
    `<div class="img-thumb"><img src="${esc(url)}"><div class="rm" onclick="removeImage()">×</div></div>`:'';
  updateBytes();
}
function removeImage(){ currentImage=''; document.getElementById('imgUrlInp').value=''; document.getElementById('imgPreview').innerHTML=''; updateBytes(); }

async function loadTemplates(){
  const tpls=await api.get('/api/sms/templates');
  document.getElementById('quickTpl').innerHTML=tpls.slice(0,6).map(t=>
    `<span class="chip" onclick="applyTpl('${t.id}')">${esc(t.title)}</span>`).join('');
  window._tpls=tpls;
}
function applyTpl(id){ const t=(window._tpls||[]).find(x=>x.id===id); if(!t)return;
  document.getElementById('msgInp').value=t.content; updateBytes(); }

async function shortenUrl(){
  const url=document.getElementById('urlInp').value.trim(); if(!url)return;
  try{ const d=await api.post('/api/sms/shorten',{url}); const ta=document.getElementById('msgInp');
    ta.value=(ta.value?ta.value+' ':'')+d.short; document.getElementById('urlInp').value=''; updateBytes(); toast('단축 URL 삽입'); }
  catch(e){ toast('단축 실패: '+e.message); }
}

async function loadBlocked(){
  blocked=await api.get('/api/sms/blocked');
  document.getElementById('blockCount').textContent=blocked.length;
  document.getElementById('blockItems').innerHTML=blocked.map(b=>`
    <div style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:10px;background:var(--surface);border:1px solid var(--border2)">
      <div class="dot dot-red"></div>
      <div style="flex:1"><div style="font-size:12.5px;font-weight:500">${esc(fmtPhone(b.phone))}</div>
        <div style="font-size:10.5px;color:var(--muted)">${esc(b.reason||'')}</div></div>
      <button class="btn btn-ghost btn-sm" onclick="unblock('${b.id}')">해제</button>
    </div>`).join('') || `<div style="font-size:12px;color:var(--muted);text-align:center;padding:8px">수신거부 없음</div>`;
}
function toggleBlock(){ const p=document.getElementById('blockPanel'); p.classList.toggle('hidden');
  document.getElementById('blockChev').textContent=p.classList.contains('hidden')?'▸':'▾'; }
async function onBlockKey(e){ if(e.key!=='Enter')return; const v=e.target.value.trim(); if(!v)return;
  try{ await api.post('/api/sms/blocked',{phone:v}); e.target.value=''; await loadBlocked(); await loadMembers(); toast('수신거부 등록'); }catch(err){ toast(err.message); } }
async function unblock(id){ await api.del('/api/sms/blocked/'+id); await loadBlocked(); await loadMembers(); }

function toggleSchedule(){ scheduleOn=!scheduleOn;
  document.getElementById('schedToggle').classList.toggle('on',scheduleOn);
  document.getElementById('schedPanel').classList.toggle('hidden',!scheduleOn);
  document.getElementById('sendBtn').textContent=scheduleOn?'예약 등록':'발송하기'; }

async function doSend(){
  const phones=targetPhones();
  const content=document.getElementById('msgInp').value.trim();
  const image_url=currentImage||null;
  if(!phones.length) return toast('수신자를 선택하세요');
  if(!content && !image_url) return toast('메시지 또는 이미지를 입력하세요');
  const btn=document.getElementById('sendBtn'); btn.disabled=true;
  try{
    if(scheduleOn){
      const d=document.getElementById('schedDate').value, t=document.getElementById('schedTime').value;
      if(!d||!t){ toast('예약 시각을 지정하세요'); btn.disabled=false; return; }
      await api.post('/api/sms/schedule',{ phones, content, image_url, send_at:new Date(d+'T'+t).toISOString() });
      toast(`${phones.length}명 예약 등록 완료`);
    } else {
      const r=await api.post('/api/sms/send',{ phones, content, image_url });
      toast(`${r.queued}명 발송 큐 등록${r.excluded?` · ${r.excluded}명 수신거부 제외`:''}`);
    }
    document.getElementById('msgInp').value=''; removeImage();
    selected.clear(); extraTags=[]; renderTags(); renderContacts(); updateQueue(); updateBytes();
    refreshBootstrap(); loadThreads();
  }catch(e){ toast('실패: '+e.message); }
  btn.disabled=false;
}

/* ── 파일 import (CSV·TXT: 이름,번호) ── */
async function importFile(e){
  const f=e.target.files[0]; if(!f)return;
  const text=await f.text();
  const rows=text.split(/\r?\n/).map(l=>l.split(/[,\t]/)).filter(a=>a.length>=2 && digits(a[1]).length>=8)
    .map(a=>({name:a[0].trim(), phone:a[1].trim()}));
  if(!rows.length){ toast('이름,번호 형식을 찾지 못했습니다'); e.target.value=''; return; }
  try{ const d=await api.post('/api/sms/members/import',{rows}); await loadMembers(); toast(`${d.imported}명 등록/갱신`); }
  catch(err){ toast(err.message); }
  e.target.value='';
}

/* ── 대화 스레드 ── */
async function loadThreads(){
  try{
    threads=await api.get('/api/sms/threads');
    document.getElementById('threadItems').innerHTML=threads.map(t=>`
      <div class="thread-item ${activeThread===t.phone?'active':''}" onclick="openThread('${t.phone}')">
        <div class="avatar" style="width:34px;height:34px;font-size:13px;background:${avatarColor(t.name)}">${initial(t.name)}</div>
        <div class="thread-meta" style="flex:1;min-width:0">
          <div style="font-size:13.5px;font-weight:600">${esc(t.name)}</div>
          <div style="font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.last)}</div>
        </div>
        <span class="thread-meta" style="font-size:10.5px;color:var(--muted)">${relTime(t.created_at)}</span>
      </div>`).join('') || `<div style="font-size:12.5px;color:var(--muted);padding:16px;text-align:center">대화 없음</div>`;
    if(activeThread) refreshChat(false);
  }catch(e){ if(e.message!=='auth') console.error(e); }
}
async function openThread(phone){ activeThread=phone; loadThreads(); refreshChat(true); }
async function refreshChat(scroll){
  if(!activeThread)return;
  const msgs=await api.get('/api/sms/thread/'+activeThread);
  const t=threads.find(x=>x.phone===activeThread);
  document.getElementById('chatName').textContent=t?t.name:fmtPhone(activeThread);
  document.getElementById('chatPhone').textContent=fmtPhone(activeThread);
  document.getElementById('chatBody').innerHTML=msgs.map(m=>`
    <div style="display:flex;flex-direction:column;gap:3px;align-items:${m.dir==='out'?'flex-end':'flex-start'}">
      ${m.image_url?`<img src="${esc(m.image_url)}" style="max-width:200px;border-radius:12px;border:1px solid var(--border2)">`:''}
      ${m.content?`<div class="bubble ${m.dir==='out'?'bubble-out':'bubble-in'}">${esc(m.content)}</div>`:''}
      <div class="bubble-time">${fmtDateTime(m.created_at)}${m.dir==='out'?' · '+(m.status==='queued'?'전송대기':'전송됨'):''}</div>
    </div>`).join('');
  const body=document.getElementById('chatBody'); if(scroll!==false) body.scrollTop=body.scrollHeight;
}
function onReplyKey(e){ if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){ e.preventDefault(); sendReply(); } }
async function sendReply(){
  const inp=document.getElementById('replyInp'); const content=inp.value.trim();
  if(!content||!activeThread)return;
  try{ await api.post('/api/sms/send',{ phones:[activeThread], content }); inp.value=''; toast('전송 큐 등록'); refreshChat(); refreshBootstrap(); }
  catch(e){ toast(e.message); }
}

boot();
</script>
</body>
</html>
