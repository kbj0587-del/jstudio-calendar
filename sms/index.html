<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>메시지 발송센터 · J.SMS</title>
<link rel="stylesheet" href="sms.css">
<!-- PWA: /sms/ 전용 앱으로 설치(캘린더와 별도 앱) -->
<link rel="manifest" href="/sms/manifest.json">
<meta name="theme-color" content="#0A84FF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="J.SMS">
<link rel="apple-touch-icon" href="/icons/sms-192.png">
<link rel="icon" href="/icons/sms-192.png">
</head>
<body>
<div id="hdr"></div>

<div class="wrap">
  <div class="dash" id="dash">
    <!-- 왼쪽: 발송 패널 (B안 메신저 컴포저) -->
    <div class="compose" id="compose">

      <!-- ⓪ 통화 후 발송 대기 (반자동 · 대기 건이 있을 때만 보임) -->
      <div id="callPending" class="hidden" style="margin-bottom:14px"></div>

      <!-- ① 받는 사람: 칩 필드 하나로 통합 -->
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div class="section-label" style="margin:0">받는 사람</div>
          <span style="font-size:13px;font-weight:600;color:var(--accent)" id="queueCount">0명</span>
        </div>

        <!-- 답장 / 대량 발송 상태 표시 + 명단 교체 되돌리기 -->
        <div id="replyBar" class="hidden"
             style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px">
          <span id="replyBadge" class="pill" style="font-size:11.5px"></span>
          <button id="replyUndo" class="btn btn-ghost btn-sm hidden"
                  style="font-size:11.5px;padding:3px 10px" onclick="undoRecipientReplace()">되돌리기</button>
        </div>

        <div style="position:relative">
          <div class="chipfield" onclick="document.getElementById('tagInp').focus()">
            <span id="tagChips" style="display:contents"></span>
            <input id="tagInp" placeholder="이름·번호·그룹 검색" autocomplete="off"
                   onkeydown="onTagKey(event)" oninput="onTagInput()" onpaste="onTagPaste(event)">
            <button class="tool-btn" style="width:32px;height:32px;margin-left:auto;flex-shrink:0" title="엑셀·CSV 파일로 대량 추가"
                    onclick="event.stopPropagation();document.getElementById('bulkFileInp').click()">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><path d="M14 2v6h6"></path><path d="M12 18v-6"></path><path d="M9 15l3 3 3-3"></path></svg>
            </button>
          </div>
          <div id="tagSuggest" class="suggest hidden"></div>
        </div>
        <input type="file" id="bulkFileInp" accept=".csv,.txt,.xlsx,.xls,.vcf" style="display:none" onchange="onBulkFile(event)">
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px" id="groupChips"></div>
      </div>

      <!-- ② 메시지: 본문 + 하단 툴바 -->
      <div>
        <div class="msgcard">
          <textarea id="msgInp" rows="5" placeholder="메시지를 입력하세요 — 링크는 자동으로 단축됩니다 (Ctrl+Enter 발송)"
                    oninput="updateBytes(); debounceShorten()" onblur="autoShorten(false)" onpaste="onMsgPaste()"
                    onkeydown="onMsgKey(event)"></textarea>
          <div class="toolbar">
            <button class="tool-btn" id="tb_img" title="이미지 첨부 (MMS)" onclick="togglePanel('img')">
              <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
              <span class="dot hidden" id="dot_img"></span>
            </button>
            <button class="tool-btn" id="tb_tpl" title="템플릿" onclick="togglePanel('tpl')">
              <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><path d="M14 2v6h6"></path><path d="M16 13H8"></path><path d="M16 17H8"></path></svg>
            </button>
            <button class="tool-btn" id="tb_sched" title="예약 발송" onclick="togglePanel('sched')">
              <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 6v6l4 2"></path></svg>
              <span class="dot hidden" id="dot_sched"></span>
            </button>
            <button class="tool-btn" id="tb_var" title="변수 삽입 — 수신자별 개인화" onclick="togglePanel('var')" style="font-size:13px;font-weight:700">{&#8202;}</button>
            <button class="tool-btn" id="tb_emoji" title="이모티콘" onclick="togglePanel('emoji')">
              <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
            </button>
            <button class="tool-btn" id="tb_sym" title="특수문자" onclick="togglePanel('sym')" style="font-size:15px;font-weight:700">※</button>
            <span style="flex:1;text-align:right;font-size:11.5px;color:var(--muted)" id="byteInfo">0 byte · SMS</span>
          </div>

          <!-- 변수 패널 -->
          <div class="tool-panel hidden" id="panel_var">
            <div style="display:flex;flex-wrap:wrap;gap:6px" id="varChips"></div>
            <div style="font-size:11px;color:var(--muted)" id="varHint"></div>
          </div>

          <!-- 이모티콘 패널 -->
          <div class="tool-panel hidden" id="panel_emoji">
            <div style="font-size:11px;color:var(--muted)">
              ⚠️ 이모지를 넣으면 문자가 유니코드로 전송돼 <b>1건당 70자</b>로 줄어듭니다 (byte 표시 확인).
            </div>
            <div class="charGrid" id="emojiGrid"></div>
          </div>

          <!-- 특수문자 패널 -->
          <div class="tool-panel hidden" id="panel_sym">
            <div style="font-size:11px;color:var(--muted)">탭하면 커서 위치에 삽입됩니다.</div>
            <div class="charGrid" id="symGrid"></div>
          </div>

          <!-- 미리보기 (변수 사용 시 자동 표시) -->
          <div class="tool-panel hidden" id="panel_preview">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
              <span style="font-size:11px;font-weight:600;color:var(--muted)" id="pvLabel"></span>
              <span style="display:flex;gap:4px">
                <button class="btn btn-ghost btn-sm" onclick="pvNav(-1)">‹</button>
                <button class="btn btn-ghost btn-sm" onclick="pvNav(1)">›</button>
                <button class="btn btn-ghost btn-sm" onclick="testSend()">테스트 발송</button>
              </span>
            </div>
            <div id="pvBody" style="font-size:13px;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:9px 12px;white-space:pre-wrap;line-height:1.55"></div>
          </div>

          <!-- 이미지 패널 -->
          <div class="tool-panel hidden" id="panel_img">
            <div id="imgZone" class="img-zone"
                 onclick="document.getElementById('imgFileInp').click()"
                 ondragover="imgDrag(event,true)" ondragleave="imgDrag(event,false)" ondrop="imgDrop(event)">
              이미지를 드래그하거나 클릭해 첨부 · 붙여넣기(Ctrl+V) 지원
            </div>
            <input type="file" id="imgFileInp" accept="image/*" style="display:none" onchange="onImgFile(event)">
            <input id="imgUrlInp" class="inp" placeholder="또는 이미지 URL 입력" onchange="setImageFromUrl()">
            <div id="imgPreview" style="display:flex;gap:8px;flex-wrap:wrap"></div>
          </div>

          <!-- 템플릿 패널 -->
          <div class="tool-panel hidden" id="panel_tpl">
            <div id="quickTpl" style="display:flex;flex-wrap:wrap;gap:6px"></div>
          </div>

          <!-- 예약 패널 -->
          <div class="tool-panel hidden" id="panel_sched">
            <label style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:13px;font-weight:500">
              예약 발송 사용
              <div class="toggle" id="schedToggle" onclick="toggleSchedule(event)"><div class="toggle-knob"></div></div>
            </label>
            <div id="schedInputs" class="hidden" style="display:flex;gap:8px">
              <input type="date" id="schedDate" class="inp" style="flex:1" onchange="updateSummary()">
              <input type="time" id="schedTime" class="inp" style="width:118px" onchange="updateSummary()">
            </div>
          </div>
        </div>
        <div id="shortNote" class="hidden" style="font-size:11px;color:var(--muted);margin-top:6px">🔗 링크가 자동 단축되었습니다 — 클릭수는 발송 이력에서 집계됩니다</div>
      </div>

      <!-- ③ 요약 + 발송 -->
      <div style="display:flex;flex-direction:column;gap:8px">
        <div class="summary-line">
          <span id="sendSummary">받는 사람을 선택하세요</span>
          <span id="gwInline" style="color:var(--green-d)"></span>
        </div>
        <button class="btn" id="sendBtn" onclick="doSend()" style="padding:13px;font-size:14.5px">보내기</button>
      </div>
    </div>

    <!-- 드래그 리사이즈 핸들 -->
    <div class="resizer" id="resizer" title="드래그하여 폭 조절"><div class="resizer-grip"></div></div>

    <!-- 오른쪽: 메신저 -->
    <div class="messenger" id="messenger">
      <div class="thread-list">
        <div class="section-label" style="padding:16px 16px 8px">대화</div>
        <div id="threadItems" style="flex:1;overflow-y:auto"></div>
      </div>
      <div class="chat">
        <div id="chatHeader" style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border2)">
          <div><div id="chatName" style="font-size:14.5px;font-weight:600">대화를 선택하세요</div>
               <div id="chatPhone" style="font-size:12px;color:var(--muted);margin-top:1px"></div></div>
          <div style="display:flex;align-items:center;gap:8px">
            <button class="btn btn-ghost btn-sm" id="delThreadBtn" onclick="delThread()"
                    title="이 대화 기록 전체 삭제" style="color:var(--red);display:none">대화 삭제</button>
            <div class="pill pill-green" id="fcmPill"><div class="dot dot-green"></div>게이트웨이</div>
          </div>
        </div>
        <div class="chat-body" id="chatBody"></div>
        <!-- 입력창은 왼쪽 하나로 통합됨. 이 자리는 안내 줄(누르면 왼쪽 본문으로 이동) -->
        <div id="composeHint" onclick="focusComposer()"
             style="padding:14px 20px;border-top:1px solid var(--border2);display:flex;gap:8px;
                    align-items:center;justify-content:center;cursor:pointer;color:var(--muted);
                    font-size:12.5px;user-select:none">
          <span style="font-size:14px">←</span>
          <span>왼쪽 입력창에서 작성해 보냅니다</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="sms.js"></script>
<script>
/* ── 상태 ── */
let members = [], groups = [], senders = [], selectedSender = 0;
let recipients = [];           // {kind:'person',phone,name} | {kind:'group',id,name,phones:[]}
let gwContacts = [];
let threads = [], activeThread = null;
let scheduleOn = false;
let currentImage = '';
let composeW = parseInt(localStorage.getItem('sms_composeW'),10) || 400;

async function boot(){
  renderHeader('index',
    `<span class="pill pill-gray" id="senderPill" style="cursor:pointer" onclick="openSenderModal()">발신 —</span>
     <span class="pill pill-gray" id="gwPill"><div class="dot dot-red"></div>게이트웨이</span>
     <span class="pill pill-gray" id="quotaPill">오늘 0/0</span>`);
  applyComposeWidth();
  initResizer();
  window.addEventListener('resize', applyComposeWidth);
  window.addEventListener('paste', onGlobalPaste);
  await refreshBootstrap();
  await Promise.all([loadMembers(), loadGroups(), loadTemplates(), loadThreads(), loadGwContacts(), loadCallPending()]);
  renderVarChips(); updateBytes(); updateSummary();
  applyPrefillRecipients();     // 연락처 페이지에서 "발송 대상으로 보내기"로 넘어온 수신자
  document.getElementById('tagInp').addEventListener('blur', ()=>setTimeout(hideSuggest, 200));
  setInterval(loadThreads, 20000);
  setInterval(refreshBootstrap, 30000);
  setInterval(loadCallPending, 30000);
}
window.onAuthReady = boot;

/* ── 리사이즈 ── */
function applyComposeWidth(){
  const c=document.getElementById('compose');
  if (window.innerWidth<=900){ c.style.width=''; } else { c.style.width=composeW+'px'; }
}
function initResizer(){
  const h=document.getElementById('resizer');
  h.addEventListener('mousedown',(e)=>{
    if (window.innerWidth<=900) return;
    e.preventDefault();
    const startX=e.clientX, startW=composeW;
    h.classList.add('dragging'); document.body.classList.add('resizing');
    function move(ev){ composeW=Math.max(320,Math.min(640,startW+ev.clientX-startX)); document.getElementById('compose').style.width=composeW+'px'; }
    function up(){ document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up);
      h.classList.remove('dragging'); document.body.classList.remove('resizing'); localStorage.setItem('sms_composeW',composeW); }
    document.addEventListener('mousemove',move); document.addEventListener('mouseup',up);
  });
}

/* ── 부트스트랩 / 발신번호 ── */
async function refreshBootstrap(){
  try{
    const d = await api.get('/api/sms/bootstrap');
    senders = d.senders || [];
    updateSenderPill();
    const qp=document.getElementById('quotaPill'); if(qp) qp.textContent=`오늘 ${d.quotaUsed}/${d.quotaTotal}`;
    const gp=document.getElementById('gwPill');
    if(gp){ gp.className='pill '+(d.gatewayOnline?'pill-green':'pill-red');
      gp.innerHTML=`<div class="dot ${d.gatewayOnline?'dot-green':'dot-red'}"></div>게이트웨이 ${d.gatewayOnline?'ON':'OFF'}`; }
    const pill=document.getElementById('fcmPill');
    if(pill){ pill.className='pill '+(d.gatewayOnline?'pill-green':'pill-red');
      pill.innerHTML=`<div class="dot ${d.gatewayOnline?'dot-green':'dot-red'}"></div>${d.gatewayOnline?'게이트웨이 ON':'게이트웨이 OFF'}`; }
    const gi=document.getElementById('gwInline');
    if(gi){ gi.textContent=d.gatewayOnline?'게이트웨이 ON':'게이트웨이 OFF'; gi.style.color=d.gatewayOnline?'var(--green-d)':'var(--red)'; }
  }catch(e){ if(e.message!=='auth') console.error(e); }
}
function updateSenderPill(){
  const s=senders[selectedSender];
  const sp=document.getElementById('senderPill'); if(sp) sp.textContent='발신 '+(s?s.number:'—');
}
function openSenderModal(){
  if(!senders.length) return toast('등록된 발신번호가 없습니다');
  openModal(`<h3>발신번호 선택</h3>
    <div style="display:flex;flex-direction:column;gap:6px">
      ${senders.map((s,i)=>`
        <div class="contact-row" style="border:1.5px solid ${i===selectedSender?'var(--accent)':'var(--border)'}"
             onclick="selectedSender=${i};updateSenderPill();closeModal()">
          <div class="check ${i===selectedSender?'on':''}" style="border-radius:50%">${i===selectedSender?'●':''}</div>
          <div style="flex:1"><div style="font-size:13px;font-weight:600">${esc(s.number)}</div>
            <div style="font-size:11.5px;color:var(--muted)">${esc(s.label||'')}</div></div>
          ${s.verified?'<span class="badge badge-green">인증됨</span>':''}
        </div>`).join('')}
    </div>`);
}

/* ── 데이터 로드 ── */
async function loadMembers(){ members = await api.get('/api/sms/members'); }
async function loadGwContacts(){
  try{ const gc = await api.get('/api/sms/gateway-contacts'); gwContacts = gc.filter(c=>!c.in_members); }catch(e){}
}
async function loadGroups(){
  groups = await api.get('/api/sms/groups');
  document.getElementById('groupChips').innerHTML =
    `<span class="chip chip-accent" onclick="openMemberPicker()">☑ 연락처·그룹에서 선택</span>` +
    `<span class="chip" onclick="document.getElementById('bulkFileInp').click()">📄 파일 대량 추가</span>` +
    `<a class="chip" href="sample-recipients.csv" download style="text-decoration:none">샘플 ⤓</a>`;
}
async function loadTemplates(){
  const tpls=await api.get('/api/sms/templates');
  document.getElementById('quickTpl').innerHTML = tpls.map(t=>
    `<span class="chip" onclick="applyTpl('${t.id}')">${esc(t.title)}</span>`).join('') ||
    `<span style="font-size:12px;color:var(--muted)">저장된 템플릿이 없습니다 — 템플릿 페이지에서 추가하세요</span>`;
  window._tpls=tpls;
}
function applyTpl(id){ const t=(window._tpls||[]).find(x=>x.id===id); if(!t)return;
  document.getElementById('msgInp').value=t.content; updateBytes(); togglePanel('tpl'); }

/* ── 받는 사람: 칩 + 자동완성 (회원·주소록·그룹 통합) ── */
function searchDirectory(term){
  const t = term.trim(); if(!t) return [];
  const td = digits(t);
  const takenPhones = new Set(recipients.filter(r=>r.kind==='person').map(r=>r.phone));
  const takenGroups = new Set(recipients.filter(r=>r.kind==='group').map(r=>r.id));
  const people = [
    ...members.map(m=>({kind:'person', name:m.name, phone:digits(m.phone), src:'회원'})),
    ...gwContacts.map(c=>({kind:'person', name:c.name, phone:digits(c.phone), src:'주소록'})),
  ].filter(p => (p.name.includes(t) || (td.length>=3 && p.phone.includes(td))) && !takenPhones.has(p.phone));
  const grps = groups.filter(g => g.name.includes(t) && !takenGroups.has(g.id) && g.member_count>0)
    .map(g=>({kind:'group', id:g.id, name:g.name, count:g.member_count}));
  return [...grps, ...people].slice(0,8);
}
function onTagInput(){
  const v = document.getElementById('tagInp').value;
  const list = searchDirectory(v);
  const box = document.getElementById('tagSuggest');
  window._suggest = list;
  if(!v.trim() || !list.length){ box.classList.add('hidden'); box.innerHTML=''; return; }
  box.innerHTML = list.map((p,i)=> p.kind==='group' ? `
    <div class="suggest-item" onmousedown="pickSuggest(${i})">
      <div class="avatar" style="width:24px;height:24px;font-size:10px;background:var(--accent)">${svgIcon('users',13)}</div>
      <span style="flex:1;font-size:13px;font-weight:500">${esc(p.name)}</span>
      <span style="font-size:12px;color:var(--muted)">${p.count}명</span>
      <span class="badge badge-gray">그룹</span>
    </div>` : `
    <div class="suggest-item" onmousedown="pickSuggest(${i})">
      <div class="avatar" style="width:24px;height:24px;font-size:10px;background:${avatarColor(p.name)}">${initial(p.name)}</div>
      <span style="flex:1;font-size:13px;font-weight:500">${esc(p.name)}</span>
      <span style="font-size:12px;color:var(--muted)">${esc(fmtPhone(p.phone))}</span>
      <span class="badge badge-gray">${p.src}</span>
    </div>`).join('');
  box.classList.remove('hidden');
}
function pickSuggest(i){
  const p=(window._suggest||[])[i]; if(!p) return;
  if(p.kind==='group') addGroupChip(p.id);
  else addPerson(p.phone, p.name);
}
function hideSuggest(){ const b=document.getElementById('tagSuggest'); if(b) b.classList.add('hidden'); }

function addPerson(phone, name){
  if(!recipients.some(r=>r.kind==='person'&&r.phone===phone))
    recipients.push({kind:'person', phone, name:name||''});
  afterRecipientChange();
}
async function addGroupChip(gid){
  if(recipients.some(r=>r.kind==='group'&&r.id===gid)) return;
  const g=groups.find(x=>x.id===gid); if(!g) return;
  try{
    const gm=await api.get('/api/sms/groups/'+gid+'/members');
    recipients.push({kind:'group', id:gid, name:g.name,
      members:gm.map(m=>({phone:digits(m.phone), name:m.name||''}))});
    afterRecipientChange();
  }catch(e){ toast(e.message); }
}
function addAllMembers(){
  if(recipients.some(r=>r.kind==='group'&&r.id==='__all__')) return;
  recipients.push({kind:'group', id:'__all__', name:'전체 회원',
    members:members.map(m=>({phone:digits(m.phone), name:m.name||''}))});

}

/* 전체 수신자 전개 (개인 + 그룹 멤버 + 파일 행, 번호 기준 중복 제거) */
function allRecipients(){
  const out=[];
  recipients.forEach(r=>{
    if(r.kind==='person') out.push({phone:r.phone, name:r.name||''});
    else if(r.kind==='group') r.members.forEach(m=>out.push({phone:m.phone, name:m.name||''}));
    else if(r.kind==='file') r.rows.forEach(row=>{ if(!row._off) out.push(row); });
  });
  const seen=new Set();
  return out.filter(r=>{ const p=digits(r.phone); if(seen.has(p)) return false; seen.add(p); return true; });
}

/* 번호 여러 개 붙여넣기 → 한 번에 칩 추가 */
function onTagPaste(e){

/* ── 파일 업로드 (CSV·XLSX, 뿌리오 양식 호환, 연락처 미등록) ── */
async function onBulkFile(e){
  const f=e.target.files[0]; e.target.value=''; if(!f) return;
  try{
    let result;
    if(/\.vcf$/i.test(f.name)){
      result={recs:parseVcf(await readTextSmart(f)), fmt:'vcard', optout:0};
    } else {
      let rows;
      if(/\.(xlsx|xls)$/i.test(f.name)) rows=await parseXlsx(f);
      else rows=parseCsv(await readTextSmart(f));
      result=mapRows(rows);
    }
    const {recs, fmt, optout}=result;
    if(!recs.length) return toast('휴대폰 번호를 찾지 못했습니다 — 샘플 파일 형식을 확인하세요');
    const label = fmt==='ezspo'?'이지스포 회원목록' : fmt==='google'?'구글 주소록' : fmt==='vcard'?'구글 주소록(vCard)' : f.name;
    recipients.push({kind:'file', fileName:label, fmt, rows:recs});
    afterRecipientChange();
    toast(`${recs.length}명 불러옴${optout?` · 문자수신 거부 ${optout}명 제외`:''} · 연락처에는 저장되지 않습니다`);
  }catch(err){ toast('파일 읽기 실패: '+err.message); }
}
/* 번호 정규화: 국제형식 +82 10-… → 010-… (구글 주소록에 흔함) */
function normPhone(s){ let d=digits(s); if(/^82\d{9,10}$/.test(d)) d='0'+d.slice(2); return d; }
/* 인코딩 자동 감지: UTF-16(BOM) → UTF-8 → EUC-KR(엑셀 한글 CSV) */
async function readTextSmart(f){
  const buf=await f.arrayBuffer(); const u8=new Uint8Array(buf);
  if(u8[0]===0xFF&&u8[1]===0xFE) return new TextDecoder('utf-16le').decode(buf);
  if(u8[0]===0xFE&&u8[1]===0xFF) return new TextDecoder('utf-16be').decode(buf);
  try{ return new TextDecoder('utf-8',{fatal:true}).decode(buf); }
  catch(_){ return new TextDecoder('euc-kr').decode(buf); }
}
/* vCard(.vcf) 파싱: FN(이름) + TEL(번호) */
function parseVcf(text){
  const recs=[]; let name='', phones=[];
  text.split(/\r?\n/).forEach(line=>{
    if(/^BEGIN:VCARD/i.test(line)){ name=''; phones=[]; }
    else if(/^FN[;:]/i.test(line)) name=line.replace(/^FN[^:]*:/i,'').trim();
    else if(/^TEL[;:]/i.test(line)){ const p=normPhone(line.split(':').pop()); if(p.length>=8) phones.push(p); }
    else if(/^END:VCARD/i.test(line) && phones.length) recs.push({name, phone:phones[0]});
  });
  return recs;
}
function parseCsv(text){
  const rows=[]; let row=[], cell='', inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){ if(c==='"'){ if(text[i+1]==='"'){cell+='"';i++;} else inQ=false; } else cell+=c; }
    else if(c==='"') inQ=true;
    else if(c===','){ row.push(cell); cell=''; }
    else if(c==='\n'||c==='\r'){ if(c==='\r'&&text[i+1]==='\n')i++;
      row.push(cell); cell=''; if(row.some(x=>x.trim())) rows.push(row); row=[]; }
    else cell+=c;
  }
  row.push(cell); if(row.some(x=>x.trim())) rows.push(row);
  return rows;
}
async function parseXlsx(f){
  if(!window.XLSX){
    await new Promise((res,rej)=>{ const s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
      s.onload=res; s.onerror=()=>rej(new Error('엑셀 파서 로드 실패 — 인터넷 연결 확인')); document.head.appendChild(s); });
  }
  const wb=XLSX.read(await f.arrayBuffer());
  return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1, raw:false, defval:''});
}
/* 헤더 매핑 — 3가지 형식 자동 인식:
   ① 이지스포(EzSpo) 회원 목록: 회원명·전화번호 + 회원권 정보(프로그램·시작/종료일·잔여)를 변수로
   ② 뿌리오: 이름,휴대폰,[*1*]~[*8*] (헤더 없으면 이 순서로 간주)
   ③ 일반: 이름/휴대폰 열 + 나머지 제목 있는 열은 이름 있는 변수로 */
function mapRows(rows){
  if(!rows.length) return {recs:[], fmt:'generic', optout:0};
  const h=rows[0].map(x=>String(x||'').replace(/^﻿/,'').trim());

  // ① 이지스포
  if(h.includes('회원명') && h.some(x=>/전화번호|휴대폰/.test(x))){
    const pi=h.findIndex(x=>/전화번호|휴대폰/.test(x));
    const ni=h.indexOf('회원명');
    const smsIdx=h.indexOf('문자수신');
    const varCols=['프로그램','시작일','종료일','잔여일','잔여횟수'].map(l=>({l,i:h.indexOf(l)})).filter(c=>c.i>=0);
    const recs=[]; let optout=0;
    for(let i=1;i<rows.length;i++){
      const r=rows[i];
      const phone=normPhone(r[pi]||''); if(phone.length<8) continue;
      if(smsIdx>=0){ const v=String(r[smsIdx]==null?'':r[smsIdx]).trim();
        if(v==='0'||/^[xXnN]$/.test(v)||v==='거부'){ optout++; continue; } }
      const vars={}; varCols.forEach(c=>{ vars[c.l]=String(r[c.i]==null?'':r[c.i]).trim(); });
      recs.push({ name:String(r[ni]==null?'':r[ni]).trim(), phone, vars });
    }
    return {recs, fmt:'ezspo', optout};
  }

  // ② 구글 주소록 내보내기 (Google CSV: First/Middle/Last Name + Phone N - Value)
  if(h.some(x=>/^Phone \d+ - Value$/.test(x))){
    const fi=h.indexOf('First Name'), mi=h.indexOf('Middle Name'), li=h.indexOf('Last Name'), nmi=h.indexOf('Name');
    const phoneIdxs=h.map((x,i)=>/^Phone \d+ - Value$/.test(x)?i:-1).filter(i=>i>=0);
    const recs=[];
    for(let i=1;i<rows.length;i++){
      const r=rows[i];
      let name = nmi>=0 && String(r[nmi]||'').trim() ? String(r[nmi]).trim()
        : [li,mi,fi].map(ix=>ix>=0?String(r[ix]||'').trim():'').join('');   // 한국식: 성+이름
      let phone='';
      for(const pi of phoneIdxs){
        const raw=String(r[pi]||'').split(':::')[0];                        // 복수 값 구분자
        const d=normPhone(raw); if(d.length>=8){ phone=d; break; }
      }
      if(phone) recs.push({name, phone});
    }
    return {recs, fmt:'google', optout:0};
  }

  // ③④ 뿌리오·일반
  const hasHeader=h.some(x=>/이름|name|휴대폰|전화|phone|번호|\[\*[1-8]\*\]/i.test(x));
  let map, start, isPpurio=false;
  if(hasHeader){
    map=h.map(x=>{
      const m=x.match(/\[\*([1-8])\*\]/); if(m){ isPpurio=true; return 'v'+m[1]; }
      if(/이름|name/i.test(x)) return 'name';
      if(/휴대폰|전화|폰|phone|mobile|번호/i.test(x)) return 'phone';
      return x ? ('var:'+x) : null;                 // 제목 있는 나머지 열 → 이름 있는 변수
    });
    start=1;
  } else { map=['name','phone','v1','v2','v3','v4','v5','v6','v7','v8']; start=0; isPpurio=true; }
  const recs=[];
  for(let i=start;i<rows.length;i++){
    const rec={vars:{}};
    rows[i].forEach((cell,ci)=>{
      const k=map[ci]; if(!k) return;
      const val=String(cell==null?'':cell).trim();
      if(k.startsWith('var:')){ if(Object.keys(rec.vars).length<12) rec.vars[k.slice(4)]=val; }
      else rec[k]=val;
    });
    if(!Object.keys(rec.vars).length) delete rec.vars;
    rec.phone=normPhone(rec.phone||''); if(rec.phone.length>=8) recs.push(rec);
  }
  return {recs, fmt:isPpurio?'ppurio':'generic', optout:0};
}

/* ── 변수 (뿌리오 [*N*] + 이름 있는 변수 [*프로그램*] 등) ── */
function tplHasVars(t){ return /\[\*.+?\*\]/.test(t||''); }
function clientRender(tpl,r){
  let out=String(tpl||'');
  out=out.split('[*이름*]').join(r.name||'');
  for(let i=1;i<=8;i++) out=out.split('[*'+i+'*]').join(r['v'+i]||'');
  if(r.vars) for(const k of Object.keys(r.vars)) out=out.split('[*'+k+'*]').join(r.vars[k]==null?'':String(r.vars[k]));
  return out;
}
/* 업로드된 파일들의 변수 열 이름 수집 */
function fileVarKeys(){
  const keys=[];
  recipients.filter(r=>r.kind==='file').forEach(f=>{
    f.rows.slice(0,30).forEach(row=>{
      if(row.vars) Object.keys(row.vars).forEach(k=>{ if(!keys.includes(k)) keys.push(k); });
    });
  });
  return keys;
}
function renderVarChips(){
  const el=document.getElementById('varChips'); if(!el) return;
  const hasPpurio=recipients.some(r=>r.kind==='file'&&r.fmt==='ppurio');
  const named=fileVarKeys();
  const chip=(tok,en)=>`<span class="chip ${en?'chip-accent':''}" style="${en?'':'opacity:.4;cursor:default'}"
    ${en?`onclick="insertVar('${tok.replace(/'/g,'&#39;')}')"`:''}>${esc(tok)}</span>`;
  let html = chip('[*이름*]',true);
  named.forEach(k=>{ html+=chip('[*'+k+'*]',true); });
  if(hasPpurio || (!named.length)) html += [1,2,3,4,5,6,7,8].map(n=>chip('[*'+n+'*]',hasPpurio)).join('');
  el.innerHTML=html;
  const hintEl=document.getElementById('varHint');

function onTagKey(e){

/* ── URL 자동 단축 (붙여넣기·입력·블러 시 자동 적용) ── */
const shortCache = new Map();
let shortenTimer=null;
function debounceShorten(){ clearTimeout(shortenTimer); shortenTimer=setTimeout(()=>autoShorten(true), 900); }
function onMsgPaste(){ setTimeout(()=>autoShorten(false), 50); }
async function autoShorten(completeOnly){
  const ta=document.getElementById('msgInp');
  const text=ta.value;
  const re=/https?:\/\/[^\s]+/g;
  const shortBase=location.origin+'/s/';
  const minGain=shortBase.length+7;                 // 단축해도 안 짧아지면 그대로 둠
  let m, jobs=[];
  while((m=re.exec(text))!==null){
    let url=m[0].replace(/[),.!?;:'"”\]]+$/,'');
    if(url.startsWith(shortBase)) continue;          // 이미 단축된 링크
    if(url.length<=minGain) continue;                // 짧아질 게 없음
    if(completeOnly){                                // 입력 중: URL 뒤에 공백/줄바꿈이 있어야 완성으로 간주
      const after=text[m.index+url.length];
      if(after===undefined || !/\s/.test(after)) continue;
    }
    jobs.push(url);
  }
  for(const url of [...new Set(jobs)]){
    try{
      let short=shortCache.get(url);
      if(!short){ const d=await api.post('/api/sms/shorten',{url}); short=d.short; shortCache.set(url,short); }
      const cur=document.getElementById('msgInp');
      if(cur.value.includes(url)){
        cur.value=cur.value.split(url).join(short);
        document.getElementById('shortNote').classList.remove('hidden');
        updateBytes();
      }
    }catch(e){ /* 단축 실패 시 원본 유지 */ }
  }
}

/* ── 발송 ── */
async function doSend(){
  await autoShorten(false);                          // 남은 링크 단축 후 발송
  const recs=allRecipients();
  const content=document.getElementById('msgInp').value.trim();
  const image_url=currentImage||null;
  if(!recs.length) return toast('받는 사람을 선택하세요');
  if(!content && !image_url) return toast('메시지를 입력하세요');
  const useBulk = tplHasVars(content) || recipients.some(r=>r.kind==='file') || recs.length>100;
  const btn=document.getElementById('sendBtn'); btn.disabled=true;
  try{
    if(scheduleOn){
      if(useBulk){ toast('변수·대량 발송은 즉시 발송만 지원됩니다 (100건 초과분은 자동 분할)'); btn.disabled=false; return; }
      const d=document.getElementById('schedDate').value, t=document.getElementById('schedTime').value;
      if(!d||!t){ toast('예약 시각을 지정하세요'); btn.disabled=false; return; }
      await api.post('/api/sms/schedule',{ phones:recs.map(r=>r.phone), content, image_url, send_at:new Date(d+'T'+t).toISOString() });
      toast(`${recs.length}명 예약 등록 완료`);
    } else if(useBulk){
      if(!confirm(`${recs.length}명에게 발송합니다. 진행할까요?`)){ btn.disabled=false; return; }
      const r=await api.post('/api/sms/send-bulk',{ template:content, image_url, recipients:recs });
      toast(`${r.queued}건 즉시 발송${r.scheduled?` + ${r.scheduled}건 분할 예약(${r.batches}회)`:''}${r.excluded?` · ${r.excluded}건 수신거부 제외`:''}`);
    } else {
      const r=await api.post('/api/sms/send',{ phones:recs.map(x=>x.phone), content, image_url });
      toast(`${r.queued}명 발송 큐 등록${r.excluded?` · ${r.excluded}명 수신거부 제외`:''}`);
    }
    document.getElementById('msgInp').value=''; removeImage();
    document.getElementById('shortNote').classList.add('hidden');
    // 발송 후 명단은 비우되, 열려 있던 대화는 그대로 두고 새로고침해
    // 방금 보낸 말풍선이 바로 보이게 한다.
    _syncing=true; recipients=[]; renderChips(); renderVarChips(); updateBytes(); _syncing=false;
    _prevRecipients=null; renderReplyBar(false);
    refreshBootstrap(); loadThreads();
    if(activeThread) refreshChat(true);
  }catch(e){ toast('실패: '+e.message); }
  btn.disabled=false;
}

      단, 아직 안 나간 '전송대기'를 지우면 발송 자체가 취소됩니다. */

/* ── 대화 선택 ↔ 받는 사람 연동 (입력창 통합) ──
   대화를 고르면 받는 사람을 그 사람으로 "교체"하고 왼쪽 본문에 커서를 둔다.
   교체로 기존 명단이 날아가는 사고를 막기 위해 직전 명단을 보관해 되돌릴 수 있게 한다.
   afterRecipientChange()와 서로를 부르므로 _syncing 으로 재귀를 막는다. */
let _prevRecipients = null;   // 되돌리기용 직전 명단
let _syncing = false;         // 상호 호출 재귀 방지

async function openThread(phone){
  const t = threads.find(x=>x.phone===phone);
  const hadOthers = recipients.length>0 &&
    !(recipients.length===1 && recipients[0].kind==='person' && recipients[0].phone===phone);

  if(hadOthers) _prevRecipients = recipients.slice();
  else _prevRecipients = null;

  activeThread = phone;
  _syncing = true;
  recipients = [{ kind:'person', phone, name:(t&&t.name)||'' }];
  afterRecipientChange();
  _syncing = false;

  renderReplyBar(hadOthers);
  loadThreads();
  refreshChat(true);
  focusComposer();
}

/* 명단 교체 되돌리기 */
function undoRecipientReplace(){
  if(!_prevRecipients) return;
  _syncing = true;
  recipients = _prevRecipients.slice();
  _prevRecipients = null;
  afterRecipientChange();
  _syncing = false;
  syncThreadToRecipients();
  renderReplyBar(false);
  toast('이전 명단으로 되돌렸습니다');
}

/* 왼쪽 본문으로 커서 이동 (좁은 화면에선 스크롤도 함께) */
function focusComposer(){
  const el = document.getElementById('msgInp');
  if(!el) return;
  if(window.innerWidth <= 900) el.scrollIntoView({behavior:'smooth', block:'center'});
  el.focus();
}

/* 받는 사람 상태에 따라 오른쪽 대화를 맞춘다.
   1명 → 그 대화 자동 열기 · 0명/2명 이상 → 대량(또는 미선택) 상태 */
function syncThreadToRecipients(){
  const only = recipients.length===1 && recipients[0].kind==='person' ? recipients[0].phone : null;
  if(only){
    if(activeThread!==only){ activeThread=only; loadThreads(); refreshChat(true); }
  }
  renderReplyBar(false);
}

/* 답장 / 대량 발송 배지 렌더 */
function renderReplyBar(showUndo){
  const bar=document.getElementById('replyBar');
  const badge=document.getElementById('replyBadge');
  const undo=document.getElementById('replyUndo');
  if(!bar) return;
  const total = allRecipients().length;
  const only = recipients.length===1 && recipients[0].kind==='person' ? recipients[0] : null;

  if(only){
    badge.className='pill pill-blue';
    badge.textContent='답장 중 · '+(only.name || fmtPhone(only.phone));
    bar.classList.remove('hidden');
  } else if(total>1){
    badge.className='pill pill-gray';
    badge.textContent='대량 발송 · '+total+'명';
    bar.classList.remove('hidden');
  } else {
    bar.classList.add('hidden');
  }
  undo.classList.toggle('hidden', !showUndo || !_prevRecipients);
  renderChatMode(total, only);
}

/* 오른쪽 대화 머리말: 2명 이상이면 대량 발송 중임을 알린다 */
function renderChatMode(total, only){
  const pill=document.getElementById('fcmPill');
  const hint=document.getElementById('composeHint');
  if(!pill||!hint) return;
  if(!only && total>1){
    hint.innerHTML='<span>대량 발송 중 · 왼쪽에서 보냅니다</span>';
    hint.style.color='var(--muted)';
  } else {
    hint.innerHTML='<span style="font-size:14px">←</span><span>왼쪽 입력창에서 작성해 보냅니다</span>';
  }
}
async function refreshChat(scroll){
  if(!activeThread)return;
  const msgs=await api.get('/api/sms/thread/'+activeThread);
  const t=threads.find(x=>x.phone===activeThread);
  document.getElementById('chatName').textContent=t?t.name:fmtPhone(activeThread);
  document.getElementById('chatPhone').textContent=fmtPhone(activeThread);
  const dtb=document.getElementById('delThreadBtn'); if(dtb) dtb.style.display='';
  document.getElementById('chatBody').innerHTML=msgs.map(m=>`
    <div class="msgrow" style="display:flex;flex-direction:column;gap:3px;align-items:${m.dir==='out'?'flex-end':'flex-start'}">
      ${m.image_url?`<img src="${esc(m.image_url)}" style="max-width:200px;border-radius:12px;border:1px solid var(--border2)">`:''}
      ${m.content?`<div class="bubble ${m.dir==='out'?'bubble-out':'bubble-in'}">${esc(m.content)}</div>`:''}
      <div class="bubble-time">
        ${fmtDateTime(m.created_at)}${m.dir==='out'?' · '+(m.status==='queued'?'전송대기':'전송됨'):''}
        <button class="msgdel" title="이 메시지 기록 삭제" onclick="delMsg('${m.id}',${m.status==='queued'})">삭제</button>
      </div>
    </div>`).join('');
  const body=document.getElementById('chatBody'); if(scroll!==false) body.scrollTop=body.scrollHeight;
}
/* 오른쪽 답장 입력(replyInp)·onReplyKey()·sendReply() 는 입력창 통합으로 제거됨.
   발송은 왼쪽 doSend() 한 곳으로만 이뤄진다. */

boot();
</script>
