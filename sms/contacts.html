<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>연락처 관리 · J.SMS</title>
<link rel="stylesheet" href="sms.css">
</head>
<body>
<div id="hdr"></div>
<div class="wrap">
  <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap">
    <div><h1 class="page-title">연락처 관리</h1><p class="page-desc" style="margin:0">회원 정보를 등록·수정하고 그룹으로 분류합니다.</p></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <input id="searchInp" class="inp" style="width:200px" placeholder="이름·번호 검색" oninput="render()">
      <button class="btn btn-ghost" onclick="openBlockedModal()">🚫 수신거부 <span class="badge badge-red" id="blockBadge">0</span></button>
      <button class="btn btn-ghost" onclick="document.getElementById('csvInp').click()">CSV 업로드</button>
      <input type="file" id="csvInp" accept=".csv,.txt" style="display:none" onchange="importFile(event)">
      <button class="btn btn-ghost" onclick="openGoogleImport()">🅖 구글 연락처</button>
      <input type="file" id="googleInp" accept=".csv,.vcf" style="display:none" onchange="importGoogleFile(event)">
      <button class="btn btn-ghost" id="gwBtn" onclick="importGateway()">📱 게이트웨이 주소록</button>
      <button class="btn" onclick="openEdit()">+ 새 연락처</button>
    </div>
  </div>
  <div id="bulkBar" class="hidden" style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 14px;border-radius:12px;background:var(--accent-soft, color-mix(in srgb, var(--accent) 10%, transparent))">
    <span style="font-size:13px;font-weight:600;color:var(--accent)"><span id="selCount">0</span>명 선택됨</span>
    <span style="flex:1"></span>
    <button class="btn btn-ghost btn-sm" onclick="selClear()">선택 해제</button>
    <button class="btn btn-sm" onclick="sendSelected()">발송 대상으로 보내기</button>
    <button class="btn btn-danger btn-sm" onclick="delSelected()">선택 삭제</button>
  </div>
  <div class="card" style="padding:6px 6px 2px">
    <div class="tbl-scroll">
      <table class="tbl">
        <thead><tr>
          <th style="width:34px"><div class="check" id="selAll" onclick="toggleSelAll()" style="cursor:pointer"></div></th>
          <th>이름</th><th>연락처</th><th>프로그램</th><th>상태</th><th>잔여</th><th>만료일</th><th></th>
        </tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>
  <div id="count" style="font-size:12.5px;color:var(--muted);margin-top:12px"></div>
</div>

<script src="sms.js"></script>
<script>
let members = [];
const GROUP_LABELS = { active:'활동중', warning:'만료임박', expired:'만료', instructor:'강사', new:'신규' };
const GROUP_BADGE = { active:'badge-green', warning:'badge-orange', expired:'badge-red', instructor:'badge-gray', new:'badge-gray' };

async function boot(){ renderHeader('contacts'); await load(); refreshGwCount(); refreshBlockBadge(); }
window.onAuthReady = boot;
async function load(){ members = await api.get('/api/sms/members'); render(); }

/* 수신거부 관리 (발신부에서 이동) */
async function refreshBlockBadge(){
  try{ const b=await api.get('/api/sms/blocked'); document.getElementById('blockBadge').textContent=b.length; }catch(e){}
}
async function openBlockedModal(){
  const blocked = await api.get('/api/sms/blocked');
  openModal(`
    <h3>수신 거부 관리 <span class="badge badge-red">${blocked.length}</span></h3>
    <div style="display:flex;flex-direction:column;gap:4px;max-height:300px;overflow-y:auto">
      ${blocked.map(b=>`
        <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;background:var(--surface2)">
          <div class="dot dot-red"></div>
          <div style="flex:1"><div style="font-size:12.5px;font-weight:500">${esc(fmtPhone(b.phone))}</div>
            <div style="font-size:10.5px;color:var(--muted)">${esc(b.reason||'')}</div></div>
          <button class="btn btn-ghost btn-sm" onclick="unblock('${b.id}')">해제</button>
        </div>`).join('') || `<div style="font-size:12.5px;color:var(--muted);text-align:center;padding:12px">수신거부 없음</div>`}
    </div>
    <input class="inp" placeholder="번호 입력 후 Enter로 수신거부 등록" onkeydown="onBlockKey(event)">
    <div style="font-size:10.5px;color:var(--muted);line-height:1.5">"수신거부" 답장 수신 시 자동 등록됩니다. 등록 번호는 발송 대상에서 자동 제외됩니다.</div>`);
}
async function onBlockKey(e){ if(e.key!=='Enter')return; const v=e.target.value.trim(); if(!v)return;
  try{ await api.post('/api/sms/blocked',{phone:v}); toast('수신거부 등록'); openBlockedModal(); refreshBlockBadge(); await load(); }
  catch(err){ toast(err.message); } }
async function unblock(id){ await api.del('/api/sms/blocked/'+id); toast('해제 완료'); openBlockedModal(); refreshBlockBadge(); await load(); }

/* ── 구글 연락처 가져오기 (내보내기 파일: Google CSV 또는 vCard) ── */
function openGoogleImport(){
  openModal(`
    <h3>🅖 구글 연락처 가져오기</h3>
    <div style="font-size:13px;color:var(--muted2);line-height:1.7;background:var(--surface2);border-radius:12px;padding:14px">
      1. <a href="https://contacts.google.com" target="_blank" rel="noopener">contacts.google.com</a> 접속<br>
      2. 왼쪽 메뉴 아래 <b>내보내기</b> 클릭<br>
      3. <b>Google CSV</b>(또는 vCard) 선택 후 내보내기<br>
      4. 받은 파일을 아래 버튼으로 업로드
    </div>
    <div style="font-size:11px;color:var(--muted)">이름·전화번호와 함께 <b>구글 라벨이 그룹으로 자동 생성·배정</b>됩니다 (예: 유효회원, 종료회원, 강사). 시스템 라벨(myContacts 등)은 제외됩니다.</div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn" onclick="document.getElementById('googleInp').click()">파일 선택</button>
    </div>`);
}
function normPhone(s){ let d=digits(s); if(/^82\d{9,10}$/.test(d)) d='0'+d.slice(2); return d; }
async function readTextSmart(f){
  const buf=await f.arrayBuffer(); const u8=new Uint8Array(buf);
  if(u8[0]===0xFF&&u8[1]===0xFE) return new TextDecoder('utf-16le').decode(buf);
  if(u8[0]===0xFE&&u8[1]===0xFF) return new TextDecoder('utf-16be').decode(buf);
  try{ return new TextDecoder('utf-8',{fatal:true}).decode(buf); }
  catch(_){ return new TextDecoder('euc-kr').decode(buf); }
}
function parseCsvRows(text){
  const rows=[]; let row=[], cell='', inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){ if(c==='"'){ if(text[i+1]==='"'){cell+='"';i++;} else inQ=false; } else cell+=c; }
    else if(c==='"') inQ=true;
    else if(c===','){ row.push(cell); cell=''; }
    else if(c==='\n'||c==='\r'){ if(c==='\r'&&text[i+1]==='\n')i++;
      row.push(cell); cell=''; if(row.some(x=>x.trim())) rows.push(row); row=[]; }
    else cell+=c;
  }
  row.push(cell); if(row.some(x=>x.trim())) rows.push(row);
  return rows;
}
async function importGoogleFile(e){
  const f=e.target.files[0]; e.target.value=''; if(!f) return;
  try{
    const text=await readTextSmart(f);
    let rows=[];
    // 라벨 파싱: 구글은 " ::: " 구분, "* myContacts/starred/family" 등 시스템 라벨은 * 접두사
    const splitLabels=(s)=>String(s||'').split(':::').map(x=>x.trim()).filter(x=>x && !x.startsWith('*'));
    if(/^BEGIN:VCARD/im.test(text)){
      let name='', phones=[], labels=[];
      text.split(/\r?\n/).forEach(line=>{
        if(/^BEGIN:VCARD/i.test(line)){ name=''; phones=[]; labels=[]; }
        else if(/^FN[;:]/i.test(line)) name=line.replace(/^FN[^:]*:/i,'').trim();
        else if(/^TEL[;:]/i.test(line)){ const p=normPhone(line.split(':').pop()); if(p.length>=8) phones.push(p); }
        else if(/^CATEGORIES[;:]/i.test(line)) labels=line.replace(/^CATEGORIES[^:]*:/i,'').split(',').map(x=>x.trim()).filter(x=>x && !x.startsWith('*'));
        else if(/^END:VCARD/i.test(line) && phones.length && name) rows.push({name, phone:phones[0], labels});
      });
    } else {
      const cells=parseCsvRows(text);
      if(!cells.length) throw new Error('빈 파일');
      const h=cells[0].map(x=>String(x||'').replace(/^﻿/,'').trim());
      const fi=h.indexOf('First Name'), mi=h.indexOf('Middle Name'), li=h.indexOf('Last Name'), nmi=h.indexOf('Name');
      const labelIdx=h.findIndex(x=>x==='Labels'||x==='Group Membership');
      const phoneIdxs=h.map((x,i)=>/^Phone \d+ - Value$/.test(x)?i:-1).filter(i=>i>=0);
      if(!phoneIdxs.length) throw new Error('구글 연락처 형식이 아닙니다 (Google CSV로 내보내기 하세요)');
      for(let i=1;i<cells.length;i++){
        const r=cells[i];
        const name = nmi>=0 && String(r[nmi]||'').trim() ? String(r[nmi]).trim()
          : [li,mi,fi].map(ix=>ix>=0?String(r[ix]||'').trim():'').join('');
        let phone='';
        for(const pi of phoneIdxs){ const d=normPhone(String(r[pi]||'').split(':::')[0]); if(d.length>=8){ phone=d; break; } }
        const labels = labelIdx>=0 ? splitLabels(r[labelIdx]) : [];
        if(name && phone) rows.push({name, phone, labels});
      }
    }
    if(!rows.length) return toast('가져올 연락처가 없습니다');
    const d=await api.post('/api/sms/google-import',{rows});
    closeModal(); await load(); refreshGwCount();
    toast(`구글 연락처 ${d.imported}명 · 그룹 ${d.groups}개 · 배정 ${d.assigned}건`);
  }catch(err){ toast('가져오기 실패: '+err.message); }
}

/* CSV·TXT 업로드 (발신부에서 이동) — 이름,번호 형식 */
async function importFile(e){
  const f=e.target.files[0]; if(!f)return;
  const text=await f.text();
  const rows=text.split(/\r?\n/).map(l=>l.split(/[,\t]/)).filter(a=>a.length>=2 && digits(a[1]).length>=8)
    .map(a=>({name:a[0].trim(), phone:a[1].trim()}));
  if(!rows.length){ toast('이름,번호 형식을 찾지 못했습니다'); e.target.value=''; return; }
  try{ const d=await api.post('/api/sms/members/import',{rows}); await load(); toast(`${d.imported}명 등록/갱신`); }
  catch(err){ toast(err.message); }
  e.target.value='';
}

/* 게이트웨이(폰) 주소록 연동 */
async function refreshGwCount(){
  try{
    const gc = await api.get('/api/sms/gateway-contacts');
    const fresh = gc.filter(c=>!c.in_members).length;
    const btn = document.getElementById('gwBtn');
    if (!gc.length) btn.textContent = '📱 게이트웨이 주소록 (대기중)';
    else btn.textContent = `📱 게이트웨이 주소록 가져오기 (${fresh})`;
  }catch(e){}
}
async function importGateway(){
  try{
    const gc = await api.get('/api/sms/gateway-contacts');
    if (!gc.length) return toast('게이트웨이에서 아직 주소록이 수신되지 않았습니다');
    const fresh = gc.filter(c=>!c.in_members).length;
    if (!fresh) return toast('새로 가져올 연락처가 없습니다 (모두 등록됨)');
    if (!confirm(`게이트웨이 주소록에서 미등록 ${fresh}건을 연락처로 가져올까요?`)) return;
    const d = await api.post('/api/sms/gateway-contacts/import', {});
    await load(); refreshGwCount(); toast(`${d.imported}건 가져오기 완료`);
  }catch(e){ toast(e.message); }
}

const selected = new Set();
function curList(){
  const term=(document.getElementById('searchInp').value||'').trim();
  return members.filter(m=>!term||m.name.includes(term)||digits(m.phone).includes(digits(term)));
}
function render(){
  const list=curList();
  document.getElementById('rows').innerHTML = list.map(m=>`
    <tr>
      <td><div class="check ${selected.has(m.id)?'on':''}" style="cursor:pointer" onclick="toggleSel('${m.id}')">${selected.has(m.id)?'✓':''}</div></td>
      <td><div style="display:flex;align-items:center;gap:10px">
        <div class="avatar" style="width:30px;height:30px;font-size:12px;background:${avatarColor(m.name)}">${initial(m.name)}</div>
        <span style="font-weight:600">${esc(m.name)}</span>
        ${m.blocked?'<span class="badge badge-red">수신거부</span>':''}
      </div></td>
      <td>${esc(fmtPhone(m.phone))}</td>
      <td style="color:var(--muted2)">${esc(m.program||'-')}</td>
      <td><span class="badge ${GROUP_BADGE[m.group_type]||'badge-gray'}">${GROUP_LABELS[m.group_type]||m.group_type||'-'}</span></td>
      <td>${m.remaining??'-'}</td>
      <td style="color:var(--muted2)">${m.end_date||'-'}</td>
      <td style="text-align:right;white-space:nowrap">
        <button class="btn btn-ghost btn-sm" onclick='openEdit(${JSON.stringify(m).replace(/'/g,"&#39;")})'>수정</button>
        <button class="btn btn-danger btn-sm" onclick="del('${m.id}','${esc(m.name)}')">삭제</button>
      </td>
    </tr>`).join('') || `<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:30px">연락처가 없습니다.</td></tr>`;
  document.getElementById('count').textContent = `총 ${members.length}명`;
  syncBulkBar();
}

/* ── 다중 선택 ── */
function toggleSel(id){ selected.has(id)?selected.delete(id):selected.add(id); render(); }
function toggleSelAll(){
  const list=curList();
  const allOn=list.length && list.every(m=>selected.has(m.id));
  list.forEach(m=>allOn?selected.delete(m.id):selected.add(m.id));
  render();
}
function selClear(){ selected.clear(); render(); }
function syncBulkBar(){
  const list=curList();
  document.getElementById('selCount').textContent=selected.size;
  document.getElementById('bulkBar').classList.toggle('hidden', selected.size===0);
  const sa=document.getElementById('selAll');
  const allOn=list.length && list.every(m=>selected.has(m.id));
  sa.classList.toggle('on', allOn); sa.textContent=allOn?'✓':'';
}
async function delSelected(){
  const ids=[...selected];
  if(!ids.length) return;
  if(!confirm(`선택한 ${ids.length}명을 삭제할까요? (되돌릴 수 없습니다)`)) return;
  try{ const d=await api.post('/api/sms/members/bulk-delete',{ids}); selected.clear(); await load(); toast(`${d.deleted}명 삭제`); }
  catch(e){ toast(e.message); }
}
function sendSelected(){
  const picked=members.filter(m=>selected.has(m.id)).map(m=>({phone:digits(m.phone), name:m.name}));
  if(!picked.length) return;
  localStorage.setItem('sms_prefill_recipients', JSON.stringify(picked));
  location.href='index.html';
}

function openEdit(m){
  m = m || {};
  openModal(`
    <h3>${m.id?'연락처 수정':'새 연락처'}</h3>
    <div><label class="lbl">이름 *</label><input id="e_name" class="inp" value="${esc(m.name||'')}"></div>
    <div><label class="lbl">연락처 *</label><input id="e_phone" class="inp" placeholder="010-0000-0000" value="${esc(m.phone||'')}"></div>
    <div><label class="lbl">프로그램</label><input id="e_program" class="inp" value="${esc(m.program||'')}"></div>
    <div style="display:flex;gap:10px">
      <div style="flex:1"><label class="lbl">상태</label>
        <select id="e_group" class="inp">
          ${['active','warning','expired','instructor','new'].map(g=>`<option value="${g}" ${m.group_type===g?'selected':''}>${GROUP_LABELS[g]}</option>`).join('')}
        </select></div>
      <div style="width:90px"><label class="lbl">잔여</label><input id="e_remaining" class="inp" type="number" value="${m.remaining??0}"></div>
    </div>
    <div><label class="lbl">만료일</label><input id="e_end" class="inp" type="date" value="${m.end_date||''}"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px">
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn" onclick="save('${m.id||''}')">저장</button>
    </div>`);
}
async function save(id){
  const body={ name:document.getElementById('e_name').value.trim(), phone:document.getElementById('e_phone').value.trim(),
    program:document.getElementById('e_program').value.trim(), group_type:document.getElementById('e_group').value,
    remaining:parseInt(document.getElementById('e_remaining').value,10)||0, end_date:document.getElementById('e_end').value||null };
  if (!body.name||!body.phone) return toast('이름과 연락처는 필수입니다');
  try{ if (id) await api.put('/api/sms/members/'+id,body); else await api.post('/api/sms/members',body);
    closeModal(); await load(); toast('저장 완료'); }catch(e){ toast(e.message); }
}
async function del(id,name){ if(!confirm(`${name} 연락처를 삭제할까요?`))return;
  await api.del('/api/sms/members/'+id); await load(); toast('삭제 완료'); }
boot();
</script>
</body>
</html>
